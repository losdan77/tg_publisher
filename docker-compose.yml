services:
  tg-publisher:
    build:
      context: .
    container_name: tg-publisher
    restart: unless-stopped
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - ./data/config:/app/config
      - ./data/prompts:/app/prompts
      - ./data/history:/app/data/history
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    build:
      context: ./deploy/nginx
    container_name: tg-publisher-nginx
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - tg-publisher
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/certbot/www:/var/www/certbot
      - ./data/certbot/conf:/etc/letsencrypt

  certbot:
    image: certbot/certbot:latest
    container_name: tg-publisher-certbot
    restart: unless-stopped
    entrypoint: /bin/sh
    volumes:
      - ./data/certbot/www:/var/www/certbot
      - ./data/certbot/conf:/etc/letsencrypt
    command: >
      -c "while :; do
      certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h;
      done"
