name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tg-publisher-main
  cancel-in-progress: true

jobs:
  ci:
    name: Test and validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate config
        run: python scripts/validate_config.py

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q

      - name: Validate nginx config
        run: |
          docker build -t tg-publisher-nginx-test deploy/nginx
          docker run --rm \
            -e DOMAIN=tg.memeinternet.site \
            -e TELEGRAM_API_PROXY_DOMAIN=tg-api-test.memeinternet.site \
            -e NGINX_BASIC_AUTH_USER=test \
            -e NGINX_BASIC_AUTH_PASSWORD=test-password \
            -e ADMIN_API_TOKEN=test-admin-token \
            tg-publisher-nginx-test nginx -t

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR || '/opt/tg-publisher' }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      ENV_FILE: ${{ secrets.ENV_FILE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/tg_publisher_key
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/tg_publisher_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload project
        run: |
          ssh -i ~/.ssh/tg_publisher_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_APP_DIR'"
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'data' \
            --exclude '.venv' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            --exclude '.ruff_cache' \
            -e "ssh -i ~/.ssh/tg_publisher_key -p $VPS_PORT" \
            ./ "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/"

      - name: Upload .env
        run: |
          test -n "$ENV_FILE"
          install -m 600 /dev/null .env.production
          printf '%s\n' "$ENV_FILE" > .env.production
          bash scripts/check_env.sh .env.production
          scp -i ~/.ssh/tg_publisher_key -P "$VPS_PORT" .env.production "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/.env"

      - name: Run deploy script
        run: |
          ssh -i ~/.ssh/tg_publisher_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "cd '$VPS_APP_DIR' && bash scripts/deploy.sh"
